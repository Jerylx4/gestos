<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detector de Gestos - Interfaz Minimalista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; }
        #canvas-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        #video-feed { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 1; }
        
        /* Panel gris sin neon */
        .glass-panel {
            background: rgba(40, 40, 40, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>
    <video id="video-feed" playsinline></video>
    <canvas id="canvas-overlay"></canvas>
    
    <div id="image-overlay" class="absolute inset-0 z-40 flex items-center justify-center pointer-events-none transition-opacity duration-300" style="opacity: 0;">
        <img src="https://picsum.photos/800/600?random=1" alt="Imagen del Puño" class="rounded-lg border-4 border-gray-400 shadow-2xl object-cover max-w-[85%] max-h-[85%]">
    </div>

    <div class="absolute bottom-10 left-1/2 transform -translate-x-1/2 z-10 pointer-events-auto">
        <div class="glass-panel px-6 py-4 flex flex-col items-center gap-3 w-64 text-center">
            
            <div class="bg-black/40 rounded-full px-3 py-1 border border-white/5 inline-flex items-center gap-2">
                <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-gray-600 transition-all duration-300"></div>
                <span id="status-text" class="text-xs text-gray-300 font-mono uppercase tracking-wider">Cargando...</span>
            </div>
            
            <div id="gesture-description" class="text-gray-100 font-mono text-lg font-semibold min-h-[28px]">
                Detectando...
            </div>
            
        </div>
    </div>

    <script type="module">
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const VIDEO_W = isMobile ? 480 : 640;
        const VIDEO_H = isMobile ? 360 : 480;

        const videoFeed = document.getElementById('video-feed');
        const canvasOverlay = document.getElementById('canvas-overlay');
        const canvasCtx = canvasOverlay.getContext('2d');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const gestureDesc = document.getElementById('gesture-description');
        const imgOverlay = document.getElementById('image-overlay');

        function updateUI(status, colorClass, desc, isFist) {
            statusText.textContent = status.replace(/_/g, ' ');
            statusDot.className = `w-2.5 h-2.5 rounded-full ${colorClass} transition-all duration-300`;
            gestureDesc.textContent = desc;
            
            if (isFist) {
                imgOverlay.style.opacity = '1';
                videoFeed.style.opacity = '0';
                canvasOverlay.style.display = 'none';
            } else {
                imgOverlay.style.opacity = '0';
                videoFeed.style.opacity = '1';
                canvasOverlay.style.display = 'block';
            }
        }

        function countFingers(landmarks) {
            const getDist = (i, j) => {
                const dx = landmarks[i].x - landmarks[j].x;
                const dy = landmarks[i].y - landmarks[j].y;
                return Math.sqrt(dx * dx + dy * dy);
            };

            const isIndexOpen = getDist(8, 0) > getDist(6, 0) * 1.05;
            const isMiddleOpen = getDist(12, 0) > getDist(10, 0) * 1.05;
            const isRingOpen = getDist(16, 0) > getDist(14, 0) * 1.05;
            const isPinkyOpen = getDist(20, 0) > getDist(18, 0) * 1.05;
            const isThumbOpen = getDist(4, 5) > getDist(2, 5) * 1.3;

            return [isThumbOpen, isIndexOpen, isMiddleOpen, isRingOpen, isPinkyOpen].filter(Boolean).length;
        }

        function onHandResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasOverlay.width, canvasOverlay.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasOverlay.width, canvasOverlay.height);

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                updateUI('BUSCANDO', 'bg-gray-400', 'Detectando...', false);
                canvasCtx.restore();
                return;
            }

            const landmarks = results.multiHandLandmarks[0];

            // Trazado de dedos en escala de grises
            drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#cccccc', lineWidth: 1.5});
            drawLandmarks(canvasCtx, landmarks, {color: '#ffffff', lineWidth: 1, radius: isMobile ? 3 : 1.5});

            const fingerCount = countFingers(landmarks);
            let description = '';
            let isFist = false;

            if (fingerCount === 5) {
                description = '👋 MANO ABIERTA';
            } else if (fingerCount === 0) {
                description = '✊ PUÑO CERRADO';
                isFist = true;
            } else if (fingerCount === 1) {
                description = '☝️ UN DEDO';
            } else if (fingerCount === 2) {
                description = '✌️ DOS DEDOS';
            } else if (fingerCount === 3) {
                description = '🤟 TRES DEDOS';
            } else if (fingerCount === 4) {
                description = '🖖 CUATRO DEDOS';
            }

            // Usamos color blanco para indicar que está rastreando activamente
            updateUI('RASTREANDO', 'bg-white', description, isFist);
            canvasCtx.restore();
        }

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: VIDEO_W }, height: { ideal: VIDEO_H } }
                });
                videoFeed.srcObject = stream;
                videoFeed.width = VIDEO_W;
                videoFeed.height = VIDEO_H;
                await new Promise(r => { videoFeed.onloadedmetadata = () => { videoFeed.play(); r(); }; });
                
                canvasOverlay.width = videoFeed.videoWidth;
                canvasOverlay.height = videoFeed.videoHeight;
                
                const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
                hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
                hands.onResults(onHandResults);

                const camera = new Camera(videoFeed, {
                    onFrame: async () => { await hands.send({ image: videoFeed }); },
                    width: VIDEO_W,
                    height: VIDEO_H
                });
                await camera.start();
                updateUI('LISTO', 'bg-gray-400', 'Muestra tu mano', false);

            } catch (e) {
                console.error('Error:', e);
                updateUI('ERROR', 'bg-gray-700', 'Sin cámara', false);
            }
        }

        init();
    </script>
</body>
</html>
