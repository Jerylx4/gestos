<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detector de Gestos de Mano Avanzado - Trazado de Dedos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #010203; font-family: 'Segoe UI', sans-serif; }
        #canvas-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        #video-feed { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 1; }
        
        .glass-panel {
            background: rgba(8, 12, 20, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 16px;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <video id="video-feed" playsinline></video>
    <canvas id="canvas-overlay"></canvas>
    
    <div id="image-overlay" class="absolute inset-0 z-40 flex items-center justify-center pointer-events-none transition-opacity duration-300" style="opacity: 0;">
        <img src="https://picsum.photos/800/600?random=1" alt="Imagen del Puño" class="rounded-2xl border-4 border-cyan-400 shadow-[0_0_60px_rgba(0,255,255,0.7)] object-cover max-w-[85%] max-h-[85%]">
    </div>

    <div class="absolute top-0 right-0 z-10 p-6 pointer-events-auto">
        <div class="glass-panel p-6 flex flex-col gap-4 text-center">
            <h1 class="text-cyan-300 text-3xl font-bold uppercase tracking-widest">Rastreo <span class="text-white">Gesticular</span></h1>
            
            <div class="bg-black/40 rounded-full px-4 py-1.5 border border-white/5 inline-flex items-center gap-2.5">
                <div id="status-dot" class="w-3 h-3 rounded-full bg-red-500 transition-all duration-300"></div>
                <span id="status-text" class="text-sm text-gray-200 font-mono uppercase tracking-wider">Cargando...</span>
            </div>
            
            <div id="gesture-description" class="text-gray-400 font-mono pt-3 border-t border-white/10 text-xl font-bold min-h-[50px]">
                Detectando gesto...
            </div>
            
            <p class="text-xs text-cyan-700 pt-1 font-mono">Mediapipe v1.0 | v2.1</p>
        </div>
    </div>

    <script type="module">
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const VIDEO_W = isMobile ? 480 : 640;
        const VIDEO_H = isMobile ? 360 : 480;

        const videoFeed = document.getElementById('video-feed');
        const canvasOverlay = document.getElementById('canvas-overlay');
        const canvasCtx = canvasOverlay.getContext('2d');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const gestureDesc = document.getElementById('gesture-description');
        const imgOverlay = document.getElementById('image-overlay');

        function updateUI(status, color, desc, isFist) {
            statusText.textContent = status.replace(/_/g, ' ');
            statusDot.className = `w-3 h-3 rounded-full ${color} transition-all duration-300`;
            gestureDesc.textContent = desc;
            
            // Si es puño cerrado, ocultamos la cámara y mostramos la imagen
            if (isFist) {
                imgOverlay.style.opacity = '1';
                videoFeed.style.opacity = '0';
                canvasOverlay.style.display = 'none';
            } else {
                imgOverlay.style.opacity = '0';
                videoFeed.style.opacity = '1';
                canvasOverlay.style.display = 'block';
            }
        }

        function countFingers(landmarks) {
            const getDist = (i, j) => {
                const dx = landmarks[i].x - landmarks[j].x;
                const dy = landmarks[i].y - landmarks[j].y;
                return Math.sqrt(dx * dx + dy * dy);
            };

            const isIndexOpen = getDist(8, 0) > getDist(6, 0) * 1.05;
            const isMiddleOpen = getDist(12, 0) > getDist(10, 0) * 1.05;
            const isRingOpen = getDist(16, 0) > getDist(14, 0) * 1.05;
            const isPinkyOpen = getDist(20, 0) > getDist(18, 0) * 1.05;

            // Detección especial para el pulgar
            const isThumbOpen = getDist(4, 5) > getDist(2, 5) * 1.3;

            return [isThumbOpen, isIndexOpen, isMiddleOpen, isRingOpen, isPinkyOpen].filter(Boolean).length;
        }

        function onHandResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasOverlay.width, canvasOverlay.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasOverlay.width, canvasOverlay.height);

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                updateUI('BUSCANDO_MANO', 'bg-yellow-500', 'Detectando...', false);
                canvasCtx.restore();
                return;
            }

            updateUI('RASTREANDO', 'bg-cyan-400', 'Calculando...', false);
            const landmarks = results.multiHandLandmarks[0];

            // Trazado de dedos con DrawingUtils
            drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#ffffff', lineWidth: 1.5});
            drawLandmarks(canvasCtx, landmarks, {color: '#00ffff', lineWidth: 1, radius: isMobile ? 3 : 1.5});

            const fingerCount = countFingers(landmarks);
            let description = '';
            let isFist = false;

            if (fingerCount === 5) {
                description = '👋 MANO ABIERTA';
            } else if (fingerCount === 0) {
                description = '✊ PUÑO CERRADO';
                isFist = true;
            } else if (fingerCount === 1) {
                description = '☝️ UN DEDO';
            } else if (fingerCount === 2) {
                description = '✌️ DOS DEDOS';
            } else if (fingerCount === 3) {
                description = '🤟 TRES DEDOS';
            } else if (fingerCount === 4) {
                description = '🖖 CUATRO DEDOS';
            }

            updateUI('RASTREANDO', 'bg-cyan-400', description, isFist);
            canvasCtx.restore();
        }

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: VIDEO_W }, height: { ideal: VIDEO_H } }
                });
                videoFeed.srcObject = stream;
                videoFeed.width = VIDEO_W;
                videoFeed.height = VIDEO_H;
                await new Promise(r => { videoFeed.onloadedmetadata = () => { videoFeed.play(); r(); }; });
                
                canvasOverlay.width = videoFeed.videoWidth;
                canvasOverlay.height = videoFeed.videoHeight;
                
                const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
                hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
                hands.onResults(onHandResults);

                const camera = new Camera(videoFeed, {
                    onFrame: async () => { await hands.send({ image: videoFeed }); },
                    width: VIDEO_W,
                    height: VIDEO_H
                });
                await camera.start();
                updateUI('BUSCANDO_MANO', 'bg-yellow-500', 'Listo', false);

            } catch (e) {
                console.error('Error:', e);
                updateUI('ERROR', 'bg-red-500', 'Acceso a cámara denegado', false);
            }
        }

        init();
    </script>
</body>
</html>
